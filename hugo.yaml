baseURL: https://chunhua-chen.github.io/
locale: en-gb
title: Chunhua Chen - Economics Research
theme: PaperMod
publishDir: docs

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

# 学术网站使用 profileMode，展示个人简介
params:
  env: production
  description: "Economics researcher at UK university - Labor Economics, Applied Microeconomics"
  author: Chunhua Chen

  # Profile Mode: 改为自定义首页，不使用默认 profileMode
  profileMode:
    enabled: false

  # 社交链接（先放框架，后面填真实链接）
  socialIcons:
    - name: email
      url: "mailto:chunhua.chen@university.ac.uk"
    - name: googlescholar
      url: "https://scholar.google.com/"
    - name: orcid
      url: "https://orcid.org/"
    - name: github
      url: "https://github.com/chunhua-chen"

  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: false
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: false

  # 隐藏不需要的功能
  hideFooter: false
  hideSummary: false

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: publications
      name: Publications
      url: /publications/
      weight: 20
    - identifier: research
      name: Research
      url: /research/
      weight: 30
    - identifier: teaching
      name: Teaching
      url: /teaching/
      weight: 40
    - identifier: cv
      name: CV
      url: /cv.pdf
      weight: 50
    - identifier: contact
      name: Contact
      url: /contact/
      weight: 60

markup:
  goldmark:
    renderer:
      unsafe: true