<!-- Skip to content (accessibility) -->
<style>
  .skip-link {
    position: absolute;
    top: -100%;
    left: 0;
    z-index: 1000;
    padding: 0.75rem 1.5rem;
    background: var(--accent);
    color: #fff !important;
    font-weight: 600;
    font-size: 0.9rem;
    text-decoration: none;
  }
  .skip-link:focus {
    top: 0;
  }
</style>
